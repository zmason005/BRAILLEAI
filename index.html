<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Braille AI Terminal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header role="banner">
        <h1>Accessible AI Terminal</h1>
        <p>Optimized for refreshable Braille displays and screen reader structural navigation.</p>
    </header>

    <main id="main-content" role="main">
        <section class="test-controls" aria-label="Simulation Testing Controls">
            <h2>Prototype Testing Controls</h2>
            <button id="btn-load-list">Simulate Complex List Response</button>
            <button id="btn-load-table">Simulate Structured Table Response</button>
        </section>

        <section class="chat-wrapper" aria-label="Chat Conversation History">
            <div id="chat-log" role="log" aria-live="polite" aria-relevant="additions">
                <div class="chat-message system-message">
                    <p>Terminal ready. Type a message or use the simulation buttons above to test Braille row tracking.</p>
                </div>
            </div>
        </section>

        <section class="input-wrapper" aria-label="Message Input Area">
            <form id="chat-form" novalidate>
                <label for="user-input">Prompt Input (Press Enter to Send, Shift+Enter for new line):</label>
                <textarea 
                    id="user-input" 
                    rows="3" 
                    placeholder="Type your message here..."
                    required></textarea>
                <button type="submit" id="send-button">Send Prompt</button>
            </form>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
